<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>N-CIIA Dashboard</title>
  </head>
  <body>
    <div id="debug-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:black; color:red; z-index:9999; padding:20px; font-family:monospace; white-space:pre-wrap; overflow:auto;"></div>
    <script>
      window.onerror = function(msg, url, lineNo, columnNo, error) {
        var overlay = document.getElementById('debug-overlay');
        overlay.style.display = 'block';
        overlay.innerHTML += 'Global Error: ' + msg + '\nURL: ' + url + '\nLine: ' + lineNo + '\nStack: ' + (error ? error.stack : 'N/A') + '\n\n';
        return false;
      };
      window.addEventListener('unhandledrejection', function(event) {
        var overlay = document.getElementById('debug-overlay');
        overlay.style.display = 'block';
        overlay.innerHTML += 'Unhandled Rejection: ' + event.reason + '\n\n';
      });
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
